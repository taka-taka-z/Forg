.hdr h1{font-size:17px;font-weight:700;letter-spacing:-.5px}
.hdr .sub{font-size:11px;color:var(--txt3);margin-top:1px}
.cust{display:flex;gap:10px;align-items:center;margin-bottom:14px;padding:12px 18px;background:var(--bg-1);border:1px solid var(--border);border-radius:10px;flex-wrap:wrap}
.cust label{font-size:12px;color:var(--txt2);white-space:nowrap}
.cust input{background:var(--bg-2);border:1px solid var(--border);border-radius:6px;padding:7px 12px;color:var(--txt);font-size:13px;font-family:inherit;outline:none;transition:border .2s}
.cust input:focus{border-color:var(--cyan)}
.tabs{display:flex;gap:3px;margin-bottom:14px;background:var(--bg-1);padding:3px;border-radius:10px;border:1px solid var(--border);flex-wrap:wrap}
.tab{flex:1;padding:10px 14px;border:none;background:transparent;color:var(--txt2);font-family:inherit;font-size:12px;font-weight:500;border-radius:8px;cursor:pointer;transition:all .2s;text-align:center;white-space:nowrap;min-width:80px}
.tab:hover{background:var(--bg-2);color:var(--txt)}
.tab.active{background:var(--bg-2);color:var(--txt);box-shadow:0 2px 8px rgba(0,0,0,.3)}
.scores{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:14px}
.sc{background:var(--bg-2);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;position:relative;overflow:hidden}
.sc .lbl{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.sc .val{font-size:26px;font-weight:700;line-height:1}
.sc .unit{font-size:10px;color:var(--txt2);margin-top:2px}
.section{margin-bottom:14px;background:var(--bg-1);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 18px}
.sec-hdr-l{display:flex;align-items:center;gap:10px}
.sec-hdr h2{font-size:13px;font-weight:600}
.qcard{background:var(--bg-2);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:10px;transition:border-color .2s}
.qcard:hover{border-color:var(--border-hi)}
.qlabel{font-size:9px;color:var(--txt3);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.qtext{font-size:12px;font-weight:500;color:var(--txt);line-height:1.5;margin-bottom:3px}
.qhint{font-size:10px;color:var(--txt2);font-style:italic;margin-bottom:10px;line-height:1.4}
.score-row{display:flex;gap:5px}
.sbtn{flex:1;height:34px;border:1px solid var(--border);background:transparent;color:var(--txt3);font-family:'JetBrains Mono',monospace;font-size:12px;border-radius:5px;cursor:pointer;transition:all .15s}
.sbtn:hover{border-color:var(--cyan);color:var(--txt)}
.sbtn.sel-lo{background:rgba(239,68,68,.15);border-color:var(--red);color:var(--red);font-weight:700}
.sbtn.sel-mi{background:rgba(234,179,8,.12);border-color:var(--yellow);color:var(--yellow);font-weight:700}
.sbtn.sel-hi{background:rgba(6,182,212,.15);border-color:var(--cyan);color:var(--cyan);font-weight:700}
.slabels{display:flex;justify-content:space-between;margin-top:4px;font-size:9px;color:var(--txt3)}
.ninput{background:var(--bg-1);border:1px solid var(--border);border-radius:5px;color:var(--txt);font-family:'JetBrains Mono',monospace;font-size:14px;padding:7px 12px;width:130px;text-align:right;outline:none}
.ninput:focus{border-color:var(--cyan)}
.badge{font-family:'JetBrains Mono',monospace;font-size:9px;padding:3px 8px;border-radius:4px;letter-spacing:1px;font-weight:700}
.btn{padding:8px 18px;border:1px solid var(--border);background:var(--bg-2);color:var(--txt);font-family:inherit;font-size:11px;border-radius:6px;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:5px}
.btn:hover{border-color:var(--cyan)}
.matrix{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin:6px 0}
.mcell{padding:12px;border-radius:7px;text-align:center;border:2px solid transparent;transition:all .3s;opacity:.3}
.mcell.active{opacity:1;border-color:var(--cyan);box-shadow:0 0 14px rgba(6,182,212,.2)}
.mcell-icon{font-size:20px;margin-bottom:3px}
.mcell-name{font-size:10px;font-weight:600;line-height:1.3}
.mcell-tl{background:rgba(234,179,8,.08)}.mcell-tr{background:rgba(16,185,129,.08)}.mcell-bl{background:rgba(100,116,139,.08)}.mcell-br{background:rgba(239,68,68,.08)}
.contra{background:rgba(234,179,8,.06);border:1px solid rgba(234,179,8,.2);border-radius:7px;padding:10px 14px;margin-bottom:8px}
.contra-title{font-size:9px;color:var(--yellow);letter-spacing:2px;margin-bottom:3px;font-weight:600}
.contra-desc{font-size:11px;color:var(--txt2);line-height:1.5}
.rec{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.rec:last-child{border-bottom:none}
.rec-pri{font-size:9px;padding:2px 7px;border-radius:4px;height:fit-content;white-space:nowrap;font-weight:700;flex-shrink:0;margin-top:2px}
.pri-1{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.25)}
.pri-2{background:rgba(234,179,8,.1);color:var(--yellow);border:1px solid rgba(234,179,8,.2)}
.pri-3{background:rgba(6,182,212,.08);color:var(--cyan);border:1px solid rgba(6,182,212,.15)}
.rec-title{font-size:12px;font-weight:500;margin-bottom:2px}
.rec-desc{font-size:11px;color:var(--txt2);line-height:1.5}
@media print{
  :root{
    --bg-0:#ffffff;--bg-1:#f5f7fa;--bg-2:#f0f2f5;--bg-3:#e8ebf0;
    --border:#cccccc;--border-hi:#999999;
    --txt:#1a1a1a;--txt2:#555555;--txt3:#888888;
    --blue:#2563eb;--cyan:#0891b2;--green:#059669;--yellow:#b45309;
    --orange:#c2410c;--red:#dc2626;--purple:#7c3aed;--pink:#be185d;
  }
  @page{size:297mm 167mm;margin:6mm}
  body{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  body::before{display:none}
  .tabs,.cust,.scores,.no-print{display:none!important}
  .app{padding:0;max-width:none}
  .hdr{display:none!important}
  .print-hdr{display:flex!important}
  .result-page{font-size:10px}
  .result-grid3{grid-template-columns:1fr 1fr!important;gap:8px!important;margin-bottom:8px!important}
  .result-bottom{gap:8px!important}
  .section{margin-bottom:0!important;border-radius:6px}
  .sec-hdr{padding:6px 12px}
  .sec-hdr h2{font-size:11px}
  .forg-big{font-size:36px!important}
  .arc-desc{font-size:9px!important;line-height:1.4!important}
  .mcell{opacity:1!important;padding:8px!important}
  .mcell.active{border:2px solid #0891b2!important;box-shadow:none!important}
  .mcell-icon{font-size:16px!important}
  .mcell-name{font-size:9px!important}
  .contra{margin-bottom:4px;padding:6px 10px}
  .contra-title{font-size:8px!important}
  .contra-desc{font-size:9px!important;line-height:1.3!important}
  .rec{padding:4px 0}
  .rec-title{font-size:10px}
  .rec-desc{font-size:9px;line-height:1.3}
  .rec-pri{font-size:8px!important;padding:1px 5px!important}
  .footer-print{display:block!important}
}
@media(max-width:768px){.scores{grid-template-columns:1fr 1fr}}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg-0)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>

    const sVals=[sc.s1,sc.s2,sc.s3,sc.s4,sc.s5].filter(v=>v>0);
    const S=sVals.length>0?sVals.reduce((a,b)=>a+b,0)/sVals.length:0;

    // L: 5 questions all 1-5 scale
    const lVals=[sc.l1,sc.l2,sc.l3,sc.l4,sc.l5].filter(v=>v>0);
    const L=lVals.length>0?lVals.reduce((a,b)=>a+b,0)/lVals.length:0;

    let budgetRatio=0;let budgetScore=0;
    if(sc.revenue>0&&sc.itBudget>0){
      budgetRatio=(sc.itBudget/sc.revenue)*100;
      // Global benchmarks: JP median 3.2% (ITR) / Global avg 5.5% (Deloitte) / US avg 8.2% (Flexera)

    }
    const cVals=[sc.c1,sc.c2,budgetScore,sc.c4].filter(v=>v>0);
    const C=cVals.length>0?cVals.reduce((a,b)=>a+b,0)/cVals.length:0;

    // L': avg of 5 questions
    const lpVals=[sc.lp1,sc.lp2,sc.lp3,sc.lp4,sc.lp5].filter(v=>v>0);
    const lp_raw=lpVals.length>0?lpVals.reduce((a,b)=>a+b,0)/lpVals.length:0;

    // Contradiction adjustment
    let lp_adj=lp_raw;
    const contradictions=[];
    if(S>=4&&lp_raw>=4){lp_adj=lp_raw*0.85;contradictions.push({title:'S×L\' 乖離：「口先リーダーシップ」の疑い',desc:'変革意志（L\'）は高いが縦割り度（S）も高い。組織の壁が実際に存在する中で「やる気がある」と自己申告している場合、権限が伴っていない可能性があります。横断チームの結成と権限委譲が先決です。'});}
    if(C<=2&&lp_raw>=4){lp_adj=lp_raw*0.9;contradictions.push({title:'C×L\' 逆相関：「孤軍奮闘」リスク',desc:'危機感（C）が低いのに変革意志（L\'）が高い。リーダーが先走り、組織が付いてきていない状態です。まずCを上げる——想定被害額の可視化と経営層への定量的な危機感醸成が優先です。'});}
    if(C>=4&&lp_raw<=2){contradictions.push({title:'C×L\' 乖離：「外圧待ち・消去法型」',desc:'危機感（C）は高いのに変革意志（L\'）が低い。最も典型的な「外圧依存」パターンです。内部の変革チームを先に作り、オーナーシップを育てることが最重要です。'});}
    if(sc.s4>=4&&sc.lp4>=4){contradictions.push({title:'S4×L\'4 乖離：「計画倒れ」リスク',desc:'経営計画にIT戦略は組み込まれているが、業務部門の取り組みをIT部門が把握していない。絵に描いた餅になるリスクがあります。業務部門との定期的なすり合わせ体制を構築してください。'});}
    if(budgetScore<=2&&sc.c2>=4){contradictions.push({title:'C2×C3 乖離：「本音と建前」の疑い',desc:'セキュリティを「投資」と認識しているが、IT予算比率が低い。言葉と行動が一致していません。経営層の「投資」宣言を予算措置に転換する具体的なアクションが必要です。'});}
    if(sc.l1>=4&&budgetScore>=4){contradictions.push({title:'L1×C3 乖離：「金はあるのに動けない」症候群',desc:'IT予算比率は高水準だが、その大半が運用維持に消えている。予算の「量」ではなく「質」の問題です。固定費の圧縮によって攻めの原資を捻出する構造改革が必要です。'});}

    const LP=lp_adj;
    const denom=C*LP;const numer=S*L;
    let forg=denom>0?numer/denom:S>0?99:0;

    // Archetype
    const c_high=C>=3;const lp_high=LP>=3;
    let archetype,arcIcon,arcColor,arcDesc,arcCell;
    if(c_high&&lp_high){archetype='変革の臨界点（Zenith型）';arcIcon='🚀';arcColor='var(--green)';arcDesc='危機感と変革意志が高水準で揃っている、最も変革が加速しやすい状態です。AWでのTO-BE策定にすぐ着手できます。Start Small, Scale Fast。';arcCell='tr';}
    else if(!c_high&&lp_high){archetype='孤立無援・理想家型';arcIcon='⚡';arcColor='var(--yellow)';arcDesc='推進リーダーの熱量は本物ですが、組織全体の危機感がまだ醸成されていません。想定被害額の可視化とCSFギャップ分析を先行させてください。';arcCell='tl';}
    else if(c_high&&!lp_high){archetype='外圧依存・消去法型';arcIcon='🔥';arcColor='var(--red)';arcDesc='危機感は高いが、変革を自分事として引き受けるリーダーシップが不足。内部チャンピオンを特定し、変革ストーリーを内面化させてください。';arcCell='br';}
    else{archetype='安穏・思考停止型';arcIcon='😴';arcColor='var(--txt3)';arcDesc='危機感・変革意志ともに低く、正常性バイアスが働いている状態です。同業他社のインシデント事例で「自社に起きたら」をリアルに体感させてください。';arcCell='bl';}

    // Damage estimate
    let damage=0;
    if(sc.revenue>0){const daily=sc.revenue/365;damage=daily*14*0.2+2;}

    // Recs
    const recs=[];
    if(S>=4)recs.push({p:1,t:'横断変革チームの結成（S削減）',d:'インフラ・セキュリティ・業務部門の横断チームを経営層スポンサー付きで結成し、予算とKPIを統合してください。'});
    if(sc.s4>=4)recs.push({p:1,t:'シャドーIT/DXの棚卸し（S4削減）',d:'業務部門が独自に導入しているSaaS・AIツールを全社棚卸しし、リスクと効果の両面で可視化してください。'});
    if(L>=4)recs.push({p:1,t:'「守りのIT」比率の可視化と圧縮（L削減）',d:'IT予算の大半が運用維持に消えている状態です。ゼロトラスト統合による固定資産削減シミュレーションを提示し、「攻めのIT」への原資創出を提案してください。'});
    if(sc.l1>=4)recs.push({p:1,t:'IT予算の攻守比率を経営層にベンチマーク提示',d:'DXレポートが指摘する「70-80%が守りに消える」構造そのものです。運用維持コストの削減ロードマップと、削減分の再投資計画を策定してください。'});
    if(sc.l2>=4)recs.push({p:1,t:'クラウドリフト＆シフト計画の策定',d:'オンプレ依存度が高い状態です。業務アプリのクラウド移行優先順位を決め、ZTNA経由のアクセスに切り替える計画を策定してください。'});
    if(C<=2&&cVals.length>0)recs.push({p:1,t:'想定被害額の定量化でCを引き上げる',d:'経営層が「自分事」になっていません。同業他社のインシデント事例と自社の想定被害額算出を実施し、「未来の外圧を前借り」させてください。'});
    if(budgetScore<=2&&budgetScore>0)recs.push({p:1,t:'IT投資比率の引き上げ提案',d:`IT予算の売上高比率が${budgetRatio.toFixed(1)}%で、日本中央値（3.2%）すら下回っています。グローバル平均は5.5%、US平均は8.2%。経営層にベンチマークデータを提示し、競争力維持に必要な投資水準を議論してください。`});
    if(LP<=2&&lpVals.length>0)recs.push({p:1,t:'内部チャンピオンの特定と巻き込み',d:'L\'が不足しています。「失敗した時に最も痛い目を見る人」を特定し、個別ストーリーを作ってください。'});
    if(sc.lp4<=2&&sc.lp4>0)recs.push({p:1,t:'中計へのIT戦略組み込み',d:'経営戦略とIT戦略が分離しています。次期中計策定時にIT/DX戦略を必須議題として組み込む提案をしてください。'});
    if(sc.lp5<=2&&sc.lp5>0)recs.push({p:2,t:'PoC文化の醸成（失敗許容度の向上）',d:'「一発勝負」文化が変革のアジリティを殺しています。小規模PoCの反復を前提とした予算枠（失敗予算）の設定を提案してください。'});
    if(S>=3&&S<4)recs.push({p:2,t:'インフォーマル連携の意図的な創出',d:'横断チャンネル設置など、小さな接点を増やすことで自然に縦割りを溶かしてください。'});
    if(sc.l4>=4)recs.push({p:2,t:'現場の「限界感」を経営層に伝達',d:'担当者が限界を感じていない場合、変革の内的動機が生まれません。運用工数の可視化と将来リスクのシミュレーションで危機感を醸成してください。'});
    if(c_high&&lp_high)recs.push({p:2,t:'TO-BE設計のスコープを今すぐ画定する',d:'CISA ZTMM v2.0を参照しながら、自社の優先柱を3ヶ月以内に確定しPOCスコープを絞り込んでください。'});
    recs.push({p:3,t:'Start Small, Scale Fast の実行計画',d:'最も攻撃表面が大きい領域を1つ選び、完成形を小規模で先行導入してください。'});
    recs.sort((a,b)=>a.p-b.p);

    const answered=Object.entries(sc).filter(([k,v])=>v>0&&k!=='itBudget'&&k!=='revenue').length + (sc.itBudget>0&&sc.revenue>0?1:0);
    return{S,L,C,LP,forg,archetype,arcIcon,arcColor,arcDesc,arcCell,contradictions,damage,recs,answered,budgetRatio,budgetScore};
  },[sc]);

  const forgStr=calc.forg>10?'10.0+':calc.forg.toFixed(2);
  const forgColor=calc.forg<1?'var(--green)':calc.forg<2?'var(--yellow)':'var(--red)';
  const forgStatus=calc.forg===0?'入力待ち...':calc.forg<1?'変革の加速帯':calc.forg<2?'変革の停滞帯':'変革の膠着帯';

  const renderScore=(q,role)=>{
    if(q.type==='number')return(
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <input className="ninput" type="number" value={sc[q.id]||''} onChange={e=>up(q.id,parseFloat(e.target.value)||0)} placeholder={q.placeholder}/>
        <span style={{fontSize:11,color:'var(--txt3)'}}>{q.unit}</span>
      </div>);
    if(q.type==='budget')return(
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:11,color:'var(--txt2)',width:80}}>IT予算額:</span>
          <input className="ninput" type="number" value={sc.itBudget||''} onChange={e=>up('itBudget',parseFloat(e.target.value)||0)} placeholder="30" style={{width:110}}/>
          <span style={{fontSize:11,color:'var(--txt3)'}}>億円</span>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:11,color:'var(--txt2)',width:80}}>年間売上高:</span>
          <input className="ninput" type="number" value={sc.revenue||''} onChange={e=>up('revenue',parseFloat(e.target.value)||0)} placeholder="5000" style={{width:110}}/>
          <span style={{fontSize:11,color:'var(--txt3)'}}>億円</span>
        </div>
        {sc.itBudget>0&&sc.revenue>0&&(()=>{
          const ratio=(sc.itBudget/sc.revenue)*100;
          const level=ratio<1?'⚠ 深刻な投資不足':ratio<3?'日本平均以下':ratio<5?'日本平均〜グローバル平均':ratio<8?'グローバル平均水準':'先進的';
          const c=ratio<1?'var(--red)':ratio<3?'var(--orange)':ratio<5?'var(--yellow)':ratio<8?'var(--green)':'var(--cyan)';
          return <div style={{fontSize:11,color:c,marginTop:2}}>
            → IT予算比率: <span className="mono" style={{fontWeight:700}}>{ratio.toFixed(1)}%</span>（{level}）
            <div style={{fontSize:9,color:'var(--txt3)',marginTop:2}}>JP 3.2% (ITR) / Global 5.5% (Deloitte) / US 8.2% (Flexera)</div>
          </div>;
        })()}
      </div>);
    const isNum = role==='numerator';
    return(<div>
      <div className="score-row">{[1,2,3,4,5].map(v=>{
        const sel=sc[q.id]===v;
        const cls=sel?(isNum?(v<=2?'sel-hi':v===3?'sel-mi':'sel-lo'):(v<=2?'sel-lo':v===3?'sel-mi':'sel-hi')):'';
        return <button key={v} className={`sbtn ${cls}`} onClick={()=>up(q.id,v)}>{v}</button>;
      })}</div>
      <div className="slabels"><span>{q.lo}</span><span>{q.hi}</span></div>
    </div>);
  };

  return(<div className="app">
    <div className="hdr">
      <div className="hdr-left">
        <div className="hdr-icon" style={{backgroundImage:"url('data:image/png;base64,"+LOGO_B64+"')"}}></div>
        <div><h1>F<sub style={{fontSize:12}}>org</sub> 組織摩擦診断 <span style={{fontSize:11,color:'var(--txt3)',fontWeight:400}}>v4.1.0</span></h1>
        <div className="sub mono">Architecture Workshop // AS-IS Diagnostic</div></div>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:16}}>
        <div style={{textAlign:'right'}}>
          <div className="mono" style={{fontSize:9,color:'var(--txt3)'}}>F<sub>org</sub> = S × L / C × L'</div>
          <div className="mono" style={{fontSize:22,fontWeight:700,color:forgColor}}>{calc.answered>0?forgStr:'—'}</div>
        </div>
      </div>
    </div>

    <div className="cust">
      <label>顧客名：</label><input value={customer} onChange={e=>setCustomer(e.target.value)} placeholder="組織名（任意）..." style={{flex:1,minWidth:180}}/>
      <span className="mono" style={{fontSize:10,color:'var(--txt3)'}}>{calc.answered}/19 回答済</span>
    </div>

    {/* Intro guide - show when no answers yet */}
    {calc.answered===0&&<div className="section" style={{marginBottom:14}}>
      <div style={{padding:'20px 24px'}}>
        <div style={{display:'flex',alignItems:'flex-start',gap:16}}>
          <div style={{flex:1}}>
            <h2 style={{fontSize:15,fontWeight:700,marginBottom:8}}>F<sub style={{fontSize:10}}>org</sub> とは？</h2>
            <div style={{fontSize:12,color:'var(--txt2)',lineHeight:1.7,marginBottom:12}}>
              組織変革の「摩擦」を物理学の摩擦係数になぞらえて定量化するフレームワークです。<br/>
              <span className="mono" style={{color:'var(--cyan)'}}>F<sub>org</sub> = (S × L) / (C × L')</span> — 分子（縦割り×レガシー）が大きく、分母（危機感×変革意志）が小さいほど、組織の変革は停滞します。
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,fontSize:11,color:'var(--txt2)'}}>
              <div style={{padding:'8px 12px',background:'var(--bg-2)',borderRadius:6,border:'1px solid var(--border)'}}>
                <span style={{color:'var(--red)',fontWeight:600}}>S（縦割り）</span>— 部門間の分断度。予算の分離、意思決定の遅さ、シャドーITの放置。
              </div>
              <div style={{padding:'8px 12px',background:'var(--bg-2)',borderRadius:6,border:'1px solid var(--border)'}}>
                <span style={{color:'var(--yellow)',fontWeight:600}}>L（レガシー）</span>— 技術的負債の重さ。予算の硬直、オンプレ依存、延命運用。
              </div>
              <div style={{padding:'8px 12px',background:'var(--bg-2)',borderRadius:6,border:'1px solid var(--border)'}}>
                <span style={{color:'var(--pink)',fontWeight:600}}>C（危機感）</span>— リスクに対する金銭的認識。インシデント認知、IT投資比率、予算の独立性。
              </div>
              <div style={{padding:'8px 12px',background:'var(--bg-2)',borderRadius:6,border:'1px solid var(--border)'}}>
                <span style={{color:'var(--cyan)',fontWeight:600}}>L'（変革意志）</span>— 変革断行の覚悟。責任の所在、経営×IT連動、失敗の許容度。
              </div>
            </div>
            <div style={{marginTop:12,fontSize:11,color:'var(--txt3)',lineHeight:1.5}}>
              <span style={{color:'var(--green)'}}>F &lt; 1.0</span> 加速帯 / <span style={{color:'var(--yellow)'}}>1.0〜2.0</span> 停滞帯 / <span style={{color:'var(--red)'}}>F &gt; 2.0</span> 膠着帯 — 左の「S」タブから順に回答してください（所要時間: 約10分）
            </div>
          </div>
        </div>
      </div>
    </div>}

    <div className="scores">
      {[{l:'F_org',v:calc.answered>0?forgStr:'—',c:forgColor,u:forgStatus},
        {l:'S (縦割り)',v:calc.S>0?calc.S.toFixed(1):'—',c:'var(--red)',u:'5問'},
        {l:'L (レガシー)',v:calc.L>0?calc.L.toFixed(1):'—',c:'var(--yellow)',u:'5問'},
        {l:'C (危機感)',v:calc.C>0?calc.C.toFixed(1):'—',c:'var(--pink)',u:'4問'},
        {l:"L' (意志)",v:calc.LP>0?calc.LP.toFixed(1):'—',c:'var(--cyan)',u:'5問'},
      ].map((s,i)=>(
        <div key={i} className="sc"><div style={{position:'absolute',top:0,left:0,right:0,height:3,background:s.c}}/>
          <div className="lbl">{s.l}</div><div className="val mono" style={{color:s.c}}>{s.v}</div><div className="unit">{s.u}</div></div>
      ))}
    </div>

    <div className="tabs">
      {SECTIONS.map(s=><button key={s.key} className={`tab ${tab===s.key?'active':''}`} onClick={()=>setTab(s.key)}>
        <span className="badge" style={{background:`${s.color}18`,color:s.color,border:`1px solid ${s.color}33`,marginRight:3}}>{s.badge}</span>{s.label}
      </button>)}
      <button className={`tab ${tab==='result'?'active':''}`} onClick={()=>setTab('result')}>📊 結果</button>
    </div>

    {SECTIONS.map(sec=>tab===sec.key&&(
      <div key={sec.key}>
        <div className="section"><div className="sec-hdr"><div className="sec-hdr-l">
          <span className="badge" style={{background:`${sec.color}18`,color:sec.color,border:`1px solid ${sec.color}33`}}>{sec.badge}</span>
          <div><h2>{sec.label} — {sec.sub}</h2></div>
        </div>
        <div style={{fontSize:9,padding:'2px 10px',borderRadius:4,background:sec.role==='numerator'?'rgba(239,68,68,0.08)':'rgba(6,182,212,0.08)',color:sec.role==='numerator'?'var(--red)':'var(--cyan)',border:`1px solid ${sec.role==='numerator'?'rgba(239,68,68,0.2)':'rgba(6,182,212,0.2)'}`,fontWeight:600,whiteSpace:'nowrap'}}>{sec.roleIcon} {sec.roleLabel}</div>
        </div>
        <div style={{padding:'4px 16px 2px',fontSize:10,color:'var(--txt3)',display:'flex',alignItems:'center',gap:6}}>
          <span>{sec.roleIcon}</span>
          <span style={{color:sec.role==='numerator'?'var(--red)':'var(--cyan)',fontWeight:500}}>Forg式の{sec.role==='numerator'?'分子（摩擦）':'分母（推進力）'}</span>
          <span style={{opacity:.7}}>{sec.roleHint}</span>
        </div>
        <div style={{padding:'10px 16px'}}>
          {sec.questions.map(q=>(
            <div key={q.id} className="qcard">
              <div className="qlabel">{q.label}</div>
              <div className="qtext">{q.text}</div>
              {q.hint&&<div className="qhint">{q.hint}</div>}
              {renderScore(q,sec.role)}
            </div>
          ))}
        </div></div>
      </div>
    ))}

    {tab==='result'&&<div className="result-page">
      {/* Print-only header */}
      <div className="print-hdr" style={{display:'none',alignItems:'center',justifyContent:'space-between',padding:'8px 0',marginBottom:8,borderBottom:'2px solid var(--border)'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:32,height:32,borderRadius:7,background:"url('data:image/png;base64,"+LOGO_B64+"') center/contain no-repeat"}}></div>
          <div><div style={{fontSize:14,fontWeight:700}}>F<sub style={{fontSize:9}}>org</sub> 組織摩擦診断レポート</div>
          <div className="mono" style={{fontSize:9,color:'var(--txt3)'}}>Architecture Workshop // {customer||'顧客名未入力'}</div></div>
        </div>
        <div className="mono" style={{fontSize:28,fontWeight:700,color:forgColor}}>{calc.answered>0?forgStr:'—'}</div>
      </div>

      {/* 3-column layout: Forg+Params | Matrix+Archetype | Actions */}
      <div className="result-grid3" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:14}}>
        {/* Forg Meter */}
        <div className="section" style={{marginBottom:0}}><div className="sec-hdr"><div className="sec-hdr-l"><h2>摩擦係数 F<sub>org</sub></h2></div></div>
        <div style={{padding:'16px',textAlign:'center'}}>
          <div className="mono forg-big" style={{fontSize:48,fontWeight:700,color:forgColor}}>{calc.answered>0?forgStr:'—'}</div>
          <div style={{fontSize:11,color:forgColor,marginBottom:14}}>{forgStatus}</div>
          <div style={{height:8,background:'var(--border)',borderRadius:4,overflow:'hidden',marginBottom:5}}>
            <div style={{width:`${Math.min(100,(calc.forg/3)*100)}%`,height:'100%',background:forgColor,borderRadius:4,transition:'width .6s'}}/>
          </div>
          <div className="mono" style={{display:'flex',justifyContent:'space-between',fontSize:8,color:'var(--txt3)'}}><span>0.0</span><span>1.0</span><span>2.0</span><span>3.0+</span></div>
          <div style={{marginTop:16,textAlign:'left'}}>
            {[{k:'S',v:calc.S,c:'var(--red)',ja:'縦割り'},{k:'L',v:calc.L,c:'var(--yellow)',ja:'レガシー'},{k:'C',v:calc.C,c:'var(--pink)',ja:'危機感'},{k:"L'",v:calc.LP,c:'var(--cyan)',ja:'変革意志'}].map(p=>(
              <div key={p.k} style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                <span className="mono" style={{width:22,fontSize:11,fontWeight:700,color:p.c}}>{p.k}</span>
                <span style={{width:48,fontSize:9,color:'var(--txt2)'}}>{p.ja}</span>
                <div style={{flex:1,height:6,background:'var(--border)',borderRadius:3,overflow:'hidden'}}>
                  <div style={{width:`${(p.v/5)*100}%`,height:'100%',background:p.c,borderRadius:3,transition:'width .5s'}}/>
                </div>
                <span className="mono" style={{width:28,fontSize:11,color:p.c,textAlign:'right'}}>{p.v>0?p.v.toFixed(1):'—'}</span>
              </div>
            ))}
          </div>
          {calc.damage>0&&<div style={{marginTop:12,paddingTop:10,borderTop:'1px solid var(--border)',fontSize:11,color:'var(--txt2)'}}>
            想定被害額: <span className="mono" style={{color:'var(--red)',fontWeight:700}}>{calc.damage.toFixed(1)}億円</span>
            <span style={{fontSize:9,color:'var(--txt3)',marginLeft:6}}>※簡易推計</span>
            <div style={{fontSize:9,color:'var(--txt3)',marginTop:4,lineHeight:1.5,padding:'6px 8px',background:'var(--bg-2)',borderRadius:4,border:'1px solid var(--border)'}}>
              算出ロジック: 年間売上÷365×停止14日×利益率20%＋信用毀損2億円<br/>
              ※業種・規模により変動します。詳細なBVA/ROI算出はArchitecture Workshopにて提供しています。
            </div>
          </div>}
          {calc.budgetScore>0&&<div style={{marginTop:6,fontSize:11,color:'var(--txt2)'}}>
            IT予算比率: <span className="mono" style={{fontWeight:700,color:calc.budgetRatio<3?'var(--red)':calc.budgetRatio<5?'var(--yellow)':calc.budgetRatio<8?'var(--green)':'var(--cyan)'}}>{calc.budgetRatio.toFixed(1)}%</span>
            <span style={{color:'var(--txt3)',marginLeft:6}}>（JP 3.2% / Global 5.5% / US 8.2%）</span>
          </div>}
        </div></div>

        {/* Matrix */}
        <div className="section" style={{marginBottom:0}}><div className="sec-hdr"><div className="sec-hdr-l"><h2>組織体質マトリクス</h2></div></div>
        <div style={{padding:'14px 18px'}}>
          <div style={{fontSize:9,color:'var(--txt3)',textAlign:'center',marginBottom:3}}>L'（変革意志）High ↑</div>
          <div className="matrix">
            <div className={`mcell mcell-tl ${calc.arcCell==='tl'?'active':''}`}><div className="mcell-icon">⚡</div><div className="mcell-name">孤立無援<br/>理想家型</div></div>
            <div className={`mcell mcell-tr ${calc.arcCell==='tr'?'active':''}`}><div className="mcell-icon">🚀</div><div className="mcell-name">変革の<br/>臨界点</div></div>
            <div className={`mcell mcell-bl ${calc.arcCell==='bl'?'active':''}`}><div className="mcell-icon">😴</div><div className="mcell-name">安穏<br/>思考停止型</div></div>
            <div className={`mcell mcell-br ${calc.arcCell==='br'?'active':''}`}><div className="mcell-icon">🔥</div><div className="mcell-name">外圧依存<br/>消去法型</div></div>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:9,color:'var(--txt3)',marginTop:3}}><span>C（危機感）Low</span><span>High →</span></div>
          {/* 4-type explanation for self-service users */}
          <div style={{marginTop:10,display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,fontSize:9,color:'var(--txt3)'}}>
            <div>⚡ <b>孤立無援型</b>: 推進者はいるが組織が付いてきていない</div>
            <div>🚀 <b>臨界点型</b>: 危機感と意志が揃い変革が加速可能</div>
            <div>😴 <b>思考停止型</b>: 正常性バイアスで動けない状態</div>
            <div>🔥 <b>消去法型</b>: 外圧頼みでリーダー不在</div>
          </div>
          <div style={{marginTop:14,padding:'12px 14px',borderRadius:7,background:`${calc.arcColor}12`,border:`1px solid ${calc.arcColor}33`}}>
            <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:6}}>
              <span style={{fontSize:20}}>{calc.arcIcon}</span>
              <span style={{fontSize:13,fontWeight:700,color:calc.arcColor}}>{calc.archetype}</span>
            </div>
            <div className="arc-desc" style={{fontSize:11,color:'var(--txt2)',lineHeight:1.5}}>{calc.arcDesc}</div>
          </div>
        </div></div>
      </div>

      {/* Contradictions + Actions in one row for print */}
      <div className="result-bottom" style={{display:'grid',gridTemplateColumns:calc.contradictions.length>0?'1fr 1fr':'1fr',gap:14}}>
        {calc.contradictions.length>0&&<div className="section" style={{marginBottom:0}}>
          <div className="sec-hdr"><div className="sec-hdr-l"><h2>⚠ 矛盾検出（{calc.contradictions.length}件）</h2></div></div>
          <div style={{padding:'10px 16px'}}>
            {calc.contradictions.map((c,i)=><div key={i} className="contra"><div className="contra-title mono">⚠ {c.title}</div><div className="contra-desc">{c.desc}</div></div>)}
          </div>
        </div>}

        <div className="section" style={{marginBottom:0}}>
          <div className="sec-hdr"><div className="sec-hdr-l"><h2>変革アクション優先順位（{calc.recs.length}件）</h2></div></div>
          <div style={{padding:'10px 16px'}}>
            {calc.recs.map((r,i)=>(
              <div key={i} className="rec">
                <span className={`rec-pri mono pri-${r.p}`}>{r.p===1?'URGENT':r.p===2?'MEDIUM':'BASELINE'}</span>
                <div><div className="rec-title">{r.t}</div><div className="rec-desc">{r.d}</div></div>
              </div>
            ))}
          </div>
        </div>
      </div>

      <div className="no-print" style={{textAlign:'center',marginTop:14}}>
        <button className="btn" onClick={()=>{setSc({s1:0,s2:0,s3:0,s4:0,s5:0,l1:0,l2:0,l3:0,l4:0,l5:0,c1:0,c2:0,c4:0,lp1:0,lp2:0,lp3:0,lp4:0,lp5:0,itBudget:0,revenue:0});setTab('S');}}>🔄 リセット</button>
        <button className="btn" style={{marginLeft:8}} onClick={()=>window.print()}>🖨️ スライド用PDF出力</button>
      </div>
    </div>}

    <div style={{textAlign:'center',padding:'16px 0',fontSize:9,color:'var(--txt3)'}}>
      F<sub>org</sub> 組織摩擦診断ツール v4.1.0 — Architecture Workshop AS-IS Diagnostic<br/>
      19項目（S:5 / L:5 / C:4 / L':5）| ITR 2026 / Deloitte / Flexera ベンチマーク参照 | DXとセキュリティが連動しない理由を物理学的に診断する
      <div style={{marginTop:8,padding:'8px 16px',background:'var(--bg-1)',border:'1px solid var(--border)',borderRadius:6,display:'inline-block',maxWidth:600}}>
        <span style={{color:'var(--green)'}}>🔒 セキュリティ:</span> このツールは完全にローカルで動作します。入力データは一切外部に送信されません。安心してご利用ください。
      </div>
      <div style={{marginTop:10,fontSize:10,color:'var(--txt2)'}}>
        Designed by <a href="https://www.linkedin.com/in/takayoshi-takaoka/" target="_blank" rel="noopener" style={{color:'var(--cyan)',textDecoration:'none'}}>髙岡 隆佳</a> | Evangelist & Architect, <a href="https://www.zscaler.com/" target="_blank" rel="noopener" style={{color:'var(--cyan)',textDecoration:'none'}}>Zscaler</a>
      </div>
      <div style={{marginTop:4,fontSize:9}}>
        ゼロトラスト移行の詳細診断・ROI算出は <a href="https://www.zscaler.com/" target="_blank" rel="noopener" style={{color:'var(--cyan)',textDecoration:'none'}}>Architecture Workshop</a> にてご提供しています
      </div>
    </div>
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
